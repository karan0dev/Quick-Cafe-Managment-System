<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — QuickCafe</title>
<script>(function(){document.documentElement.setAttribute('data-theme', localStorage.getItem('qc_theme') || 'dark');})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
</head>
<body data-page="admin-dashboard">
  <div class="app-shell">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><i class="fa-solid fa-mug-saucer"></i></div>
        <div class="brand-text"><h1>QuickCafe</h1><span>Admin Panel</span></div>
      </div>
      <div class="sidebar-divider"></div>
      <ul class="nav-list">
        <li><a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-gauge-high"></i> Dashboard</a></li>
        <li><a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a></li>
        <li><a href="manage-menu.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Menu</a></li>
        <li><a href="tables.html" class="nav-item"><i class="fa-solid fa-chair"></i> Tables</a></li>
        <li><a href="reports.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
      </ul>
      <div class="sidebar-divider"></div>
      <ul class="nav-list" style="flex:0;">
        <li><a href="../customer.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> View Customer Site</a></li>
        <li><button class="nav-item admin-exit" data-admin-logout style="width:100%;text-align:left;border:0;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></li>
      </ul>
    </aside>

    <main class="main">
      <div class="mobile-topbar">
        <button data-nav-toggle class="icon-pill"><i class="fa-solid fa-bars"></i></button>
        <div class="brand"><div class="brand-mark" style="width:34px;height:34px;font-size:14px;"><i class="fa-solid fa-mug-saucer"></i></div><strong>QuickCafe Admin</strong></div>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch theme"><i class="fa-solid fa-sun"></i></button>
      </div>
      <div class="topbar">
        <div class="page-title"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
        <div class="topbar-right">
          <button class="theme-toggle" data-theme-toggle aria-label="Switch theme"><i class="fa-solid fa-sun"></i></button>
          <div class="admin-topbar-user">
            <span class="avatar"><i class="fa-solid fa-user-shield"></i></span>
            <span>Hi, <span data-admin-username>admin</span></span>
          </div>
        </div>
      </div>

      <div id="statGrid" class="stat-grid">
        <div class="stat-card"><i class="fa-solid fa-receipt"></i><h3 id="statOrdersToday">—</h3><p>Orders Today</p></div>
        <div class="stat-card"><i class="fa-solid fa-indian-rupee-sign"></i><h3 id="statRevenueToday">—</h3><p>Revenue Today</p></div>
        <div class="stat-card"><i class="fa-solid fa-fire-burner"></i><h3 id="statPending">—</h3><p>Pending Orders</p></div>
        <div class="stat-card"><i class="fa-solid fa-chair"></i><h3 id="statTables">—</h3><p>Tables Available</p></div>
        <div class="stat-card"><i class="fa-solid fa-star"></i><h3 id="statPopular">—</h3><p>Top Seller</p></div>
      </div>

      <div class="section-head">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Orders</h3>
        <a href="orders.html" class="cart-pill">View All</a>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Order</th><th>Table</th><th>Date &amp; Time</th><th>Total</th><th>Status</th></tr></thead>
          <tbody id="recentOrdersRows"><tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/script.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
